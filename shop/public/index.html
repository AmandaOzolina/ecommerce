<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shop!</title>

<style>
body {
  font-family: Arial;
  background: #f5f6fa;
  padding: 30px;
}

h1 {
  color: #2f3640;
}

.controls {
  margin-bottom: 20px;
}

button {
  padding: 8px 12px;
  margin-right: 10px;
  background: #40739e;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  background: #273c75;
}

.grid {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
}

.card {
  background: white;
  padding: 15px;
  width: 220px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.price {
  font-weight: bold;
  color: #44bd32;
}
</style>
</head>

<body>

<h1>Internetveikals</h1>

<div class="controls">
<button onclick="importProducts()">Import products</button>
<button onclick="deleteAll()">Delete all</button>
</div>

<div id="list" class="grid"></div>

<script>
async function load() {
  const res = await fetch('/products');
  const data = await res.json();

  const list = document.getElementById('list');
  list.innerHTML = '';

  data.forEach(p => {
    const div = document.createElement('div');
    div.className = 'card';

    div.innerHTML = `
      <h3>${p.name}</h3>
      <p>${p.description || ""}</p>
      <p class="price">${p.price} €</p>
      <p>Stock: ${p.stock}</p>
      <button onclick="updateStock(${p.id})">Update stock</button>
    `;

    list.appendChild(div);
  });
}

async function importProducts() {
  await fetch('/import-products');
  alert("Imported!");
  load();
}

async function deleteAll() {
  await fetch('/products', { method: 'DELETE' });
  alert("Deleted!");
  load();
}

async function updateStock(id) {
  await fetch(`/update-stock/${id}`);
  alert("Updated!");
  load();
}

load();
</script>

</body>
</html>
