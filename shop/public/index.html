<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shop!</title>

<style>
body {
  font-family: Arial;
  background: lightgray;
  padding: 30px;
}

h1 {
  color: black;
}

.controls {
  margin-bottom: 20px;
}

button {
  padding: 8px 12px;
  margin-right: 10px;
  background: blue;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  background: darkblue;
}

.grid {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
}

.card {
  background: white;
  padding: 15px;
  width: 220px;
  box-shadow: 0 2px 5px gray;
}

.price {
  font-weight: bold;
  color: green;
}

.stock {
  margin-top: 5px;
}

.small-btn {
  padding: 4px 8px;
  margin-right: 5px;
  background: gray;
}

</style>
</head>

<body>

<h1>Shop!</h1>

<div class="controls">
<button onclick="importProducts()">Import products</button>
<button onclick="deleteAll()">Delete all</button>
</div>

<div id="list" class="grid"></div>

<script>
async function load() {
  const res = await fetch('/products');
  const data = await res.json();

  const list = document.getElementById('list');
  list.innerHTML = '';

  data.forEach(p => {
    const div = document.createElement('div');
    div.className = 'card';

    div.innerHTML = `
      <h3>${p.name}</h3>
      <p>${p.description || ""}</p>
      <p class="price">${p.price} €</p>

      <div class="stock">
        Stock: ${p.stock}
      </div>

      <button class="small-btn" onclick="minus(${p.id})">-1</button>
      <button class="small-btn" onclick="plus(${p.id})">+1</button>

      <br><br>

      <button onclick="updateStock(${p.id})">Refresh this product</button>
    `;

    list.appendChild(div);
  });
}

async function plus(id) {
  const res = await fetch('/products');
  const data = await res.json();
  const p = data.find(x => x.id == id);
  p.stock++;

  await fetch('/update-local/' + id, {
    method: 'PUT',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ stock: p.stock })
  });

  load();
}

async function minus(id) {
  const res = await fetch('/products');
  const data = await res.json();
  const p = data.find(x => x.id == id);
  p.stock--;

  await fetch('/update-local/' + id, {
    method: 'PUT',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ stock: p.stock })
  });

  load();
}

async function save(data) {
  await fetch('/products', { method: 'DELETE' });

  for (const p of data) {
    await fetch('/add-local', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(p)
    });
  }

  load();
}

async function send(id) {
  const res = await fetch('/products');
  const data = await res.json();

  const product = data.find(p => p.id == id);

  await fetch('https://ecommerce-2-7adp.onrender.com/products/' + id, {
    method: 'PUT',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ stock: product.stock })
  });

  alert("Sent to warehouse");
}

async function importProducts() {await fetch('/import-products');load();}
async function deleteAll() {await fetch('/products', { method: 'DELETE' });load();}
async function updateStock(id) {await fetch(`/update-stock/${id}`);load();}

load();

</script>

</body>
</html>
