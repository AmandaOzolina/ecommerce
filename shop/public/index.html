<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shop!</title>

<style>
body {
  font-family: Arial;
  background: lightgray;
  padding: 30px;
}

h1 {
  color: black;
}

.controls {
  margin-bottom: 20px;
}

button {
  padding: 8px 12px;
  margin-right: 10px;
  background: blue;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  background: darkblue;
}

.grid {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
}

.card {
  background: white;
  padding: 15px;
  width: 220px;
  box-shadow: 0 2px 5px gray;
}

.price {
  font-weight: bold;
  color: green;
}

.stock {
  margin-top: 5px;
}

.small-btn {
  padding: 4px 8px;
  margin-right: 5px;
  background: gray;
}

</style>
</head>

<body>

<h1>Shop!</h1>

<div class="controls">
<button onclick="importProducts()">Import products</button>
<button onclick="deleteAll()">Delete all</button>
</div>

<div id="list" class="grid"></div>

<script>
async function load() {
  const res = await fetch('/products');
  const data = await res.json();

  const list = document.getElementById('list');
  list.innerHTML = '';

  for (let i = 0; i < data.length; i++) {
  const p = data[i];

  const div = document.createElement('div');
  div.className = 'card';

  const title = document.createElement('h3');
  title.innerText = p.name;

  const desc = document.createElement('p');
  if (p.description) {
    desc.innerText = p.description;
  } else {
    desc.innerText = "";
  }

  const price = document.createElement('p');
  price.className = 'price';
  price.innerText = p.price + " €";

  const stock = document.createElement('div');
  stock.className = 'stock';
  stock.innerText = "Stock: " + p.stock;

  const btnMinus = document.createElement('button');
  btnMinus.innerText = "-1";
  btnMinus.onclick = function() {
    minus(p.id);
  };

  const btnPlus = document.createElement('button');
  btnPlus.innerText = "+1";
  btnPlus.onclick = function() {
    plus(p.id);
  };

  const btnSync = document.createElement('button');
  btnSync.innerText = "Sync warehouse";
  btnSync.onclick = function() {
    updateStock(p.id);
  };

  div.appendChild(title);
  div.appendChild(desc);
  div.appendChild(price);
  div.appendChild(stock);
  div.appendChild(btnMinus);
  div.appendChild(btnPlus);

  const br = document.createElement('br');
  div.appendChild(br);
  div.appendChild(document.createElement('br'));

  div.appendChild(btnSync);

  list.appendChild(div);
}
}

async function plus(id) {
  const res = await fetch('/products');
  const data = await res.json();
  let p = null;
  for (let i = 0; i < data.length; i++) {
    if (data[i].id == id) {
      p = data[i];
  }
}
  p.stock++;

  await fetch('/update-local/' + id, {
    method: 'PUT',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ stock: p.stock })
  });

  load();
}

async function minus(id) {
  const res = await fetch('/products');
  const data = await res.json();
  let p = null;
  for (let i = 0; i < data.length; i++) {
    if (data[i].id == id) {
      p = data[i];
  }
}
  p.stock--;

  await fetch('/update-local/' + id, {
    method: 'PUT',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ stock: p.stock })
  });

  load();
}

async function importProducts() {await fetch('/import-products');load();}
async function deleteAll() {await fetch('/products', { method: 'DELETE' });load();}
async function updateStock(id) {await fetch(`/update-stock/${id}`);load();}

load();

</script>

</body>
</html>
