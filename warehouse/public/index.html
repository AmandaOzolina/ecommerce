<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Warehouse</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f6fa;
  padding: 30px;
}

h1 {
  color: #2f3640;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #ddd;
  text-align: left;
}

th {
  background: #2f3640;
  color: white;
}

button {
  padding: 5px 10px;
  border: none;
  background: #40739e;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #273c75;
}

.add-box {
  margin-bottom: 20px;
  background: white;
  padding: 15px;
}

input {
  padding: 5px;
  margin-right: 5px;
}
</style>
</head>

<body>

<h1>Warehouse Admin</h1>

<div class="add-box">
<input id="name" placeholder="name">
<input id="price" placeholder="price">
<input id="stock" placeholder="stock">
<button onclick="add()">Add</button>
</div>

<table>
<thead>
<tr>
<th>Name</th>
<th>Price</th>
<th>Stock</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="list"></tbody>
</table>

<script>
async function load() {
  const res = await fetch('/products');
  const data = await res.json();

  const list = document.getElementById('list');
  list.innerHTML = '';

  data.forEach(p => {
    const tr = document.createElement('tr');

    tr.innerHTML = `
      <td>${p.name}</td>
      <td>${p.price} €</td>
      <td>${p.stock}</td>
      <td>
        <button onclick="update(${p.id})">Edit</button>
        <button onclick="del(${p.id})">Delete</button>
      </td>
    `;

    list.appendChild(tr);
  });
}

async function add() {
  const name = document.getElementById('name').value;
  const price = document.getElementById('price').value;
  const stock = document.getElementById('stock').value;

  await fetch('/products', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      id: Date.now(),
      name,
      price: Number(price),
      stock: Number(stock),
      description: ""
    })
  });

  load();
}

async function update(id) {
  const res = await fetch('/products');
  const data = await res.json();
  const p = data.find(x => x.id == id);

  const name = prompt("Name:", p.name);
  const price = prompt("Price:", p.price);
  const stock = prompt("Stock:", p.stock);

  await fetch('/products/' + id, {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ name, price, stock })
  });

  load();
}

async function del(id) {
  await fetch('/products/' + id, { method: 'DELETE' });
  load();
}

load();
</script>

</body>
</html>
